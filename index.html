<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Pet SPA</title>
		<link
			rel="stylesheet"
			href="./css/main.css"
		/>

		<link
			rel="icon"
			type="image/x-icon"
			href="./img/favicon/favicon.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="./img/favicon/apple-touch-icon.png"
		/>
	</head>

	<body>
		<nav class="nav">
			<div class="container">
				<div class="nav__row">
					<div class="nav__list">
						<ul class="nav-list">
							<li class="nav-list__item">
								<a
									class="nav-list__link"
									href="#"
								>
									Home
								</a>
							</li>
							<li class="nav-list__item">
								<a
									class="nav-list__link"
									href="#"
								>
									About
								</a>
							</li>
							<li class="nav-list__item">
								<a
									class="nav-list__link"
									href="#"
								>
									Services
								</a>
							</li>
							<li class="nav-list__item">
								<a
									class="nav-list__link"
									href="#"
								>
									Contact
								</a>
							</li>
						</ul>
					</div>
					<div class="nav__logo">
						<img
							src="./img/logo.svg"
							alt="Pet SPA Logo"
						/>
					</div>
					<div class="nav__btn">
						<a
							class="button"
							href="#"
						>
							Book
						</a>
					</div>
					<div class="nav__mobile-btn">
						<button class="mobile-nav-btn">
							<img
								src="./img/svg/mobile-nav-btn-closed.svg"
								alt=""
							/>
						</button>
					</div>
				</div>
			</div>
		</nav>

	<div class="header">
		<div class="header__img-wrapper">
			<picture>

				<source
					srcset="./img/header/tablet/header.jpg 1x, ./img/header/tablet/header@2x.jpg 2x"
				>
				<source
					media="(min-width: 1199px)"
					srcset="./img/header/tablet/header.jpg 1x, ./img/header/tablet/header@2x.jpg 2x"
				>

					<img
						src="./img/header/desktop/header.jpg"
						alt="Header img" srcset="./img/header/desktop/header@2x.jpg 2x"
					>

			</picture>
		</div>

	</div>

	</body>
</html>
